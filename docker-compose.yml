name: meetkai

networks:
  meetkai-net:

volumes:
  redis-data:
  waha-sessions:
  lightrag-storage:
  lightrag-inputs:
  cockpit-data:
  cockpit-vendor:
  cockpit-models:
  https-portal-data:

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    hostname: redis
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - meetkai-net

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    hostname: waha
    restart: unless-stopped
    shm_size: "2g"
    mem_limit: "4g"
    expose:
      - 3000
    environment:
      TZ: ${TZ}
      REDIS_URL: ${REDIS_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_API_KEY_PLAIN: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
      WAHA_DASHBOARD_ENABLED: ${WAHA_DASHBOARD_ENABLED}
      WHATSAPP_SWAGGER_ENABLED: ${WHATSAPP_SWAGGER_ENABLED}
      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE}
      WAHA_NAMESPACE: ${WAHA_NAMESPACE}
      WAHA_BASE_URL: ${WAHA_BASE_URL}
      WAHA_LOG_FORMAT: ${WAHA_LOG_FORMAT}
      WAHA_LOG_LEVEL: ${WAHA_LOG_LEVEL}
      WAHA_PRINT_QR: ${WAHA_PRINT_QR}
      WAHA_MEDIA_STORAGE: ${WAHA_MEDIA_STORAGE}
      WHATSAPP_FILES_LIFETIME: ${WHATSAPP_FILES_LIFETIME}
      WHATSAPP_FILES_FOLDER: ${WHATSAPP_FILES_FOLDER}
      WHATSAPP_API_SCHEMA: ${WHATSAPP_API_SCHEMA}
      WHATSAPP_API_HOSTNAME: ${WHATSAPP_API_HOSTNAME}
      WHATSAPP_API_PORT: ${WHATSAPP_API_PORT}
      WAHA_APPS_ENABLED: ${WAHA_APPS_ENABLED}
    volumes:
      - waha-sessions:/app/.sessions
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - redis
    networks:
      - meetkai-net

  lightrag:
    image: ghcr.io/hkuds/lightrag:v1.5.4
    container_name: lightrag
    hostname: lightrag
    restart: unless-stopped
    expose:
      - 9621
    environment:
      TZ: ${TZ}
      HOST: 0.0.0.0
      PORT: "9621"
      LIGHTRAG_API_KEY: ${KAI_BRAIN_LIGHTRAG_API_KEY}
      WHITELIST_PATHS: /health
      WORKERS: 2
      MAX_PARALLEL_INSERT: 3
      MAX_ASYNC_LLM: 4
      MAX_ASYNC_RERANK: 4
      LLM_BINDING: openai
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST}
      LLM_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL}
      EMBEDDING_BINDING: openai
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST}
      EMBEDDING_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL}
      EMBEDDING_DIM: 2560
      RERANK_BINDING: cohere
      RERANK_BINDING_HOST: ${LIGHTRAG_RERANK_BINDING_HOST}
      RERANK_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      RERANK_MODEL: ${LIGHTRAG_RERANK_MODEL}
      SUMMARY_LANGUAGE: English
      ENTITY_EXTRACTION_USE_JSON: true
      VLM_PROCESS_ENABLE: false
    volumes:
      - lightrag-storage:/app/data/rag_storage
      - lightrag-inputs:/app/data/inputs
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9621/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - meetkai-net

  crawl4ai:
    image: unclecode/crawl4ai:0
    container_name: crawl4ai
    hostname: crawl4ai
    restart: unless-stopped
    shm_size: "2g"
    expose:
      - 11235
    command: >-
      bash -c "python -m playwright install chromium && exec bash entrypoint.sh"
    environment:
      TZ: ${TZ}
      CRAWL4AI_API_TOKEN: ${KAI_BRAIN_CRAWL4AI_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11235/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - meetkai-net

  cockpit:
    image: ghcr.io/malvavisc0/meetkai-cockpit:${KAI_IMAGE_TAG:-latest}
    pull_policy: always
    user: appuser
    container_name: cockpit
    hostname: cockpit
    restart: unless-stopped
    command: kai cockpit serve --host 0.0.0.0 --port 8080
    expose:
      - "8080"
    volumes:
      - cockpit-data:/app/data
      - cockpit-vendor:/app/vendor
      - cockpit-models:/app/models
    env_file: .env
    depends_on:
      - waha
      - crawl4ai
      - lightrag
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - meetkai-net

  https-portal:
    image: steveltn/https-portal:1
    container_name: https-portal
    hostname: https-portal
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAINS: >
        ${SITE_DOMAIN:-meetk.ai} -> http://cockpit:8080,
        www.${SITE_DOMAIN:-meetk.ai} -> http://cockpit:8080
      STAGE: ${HTTPS_PORTAL_STAGE:-staging}
      WEBSOCKET: "true"
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-1M}
    volumes:
      - https-portal-data:/var/lib/https-portal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - cockpit
    networks:
      - meetkai-net
