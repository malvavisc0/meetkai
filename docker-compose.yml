services:
  redis:
    image: redis
    container_name: redis
    hostname: redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

  # WhatsApp HTTP API (WAHA). WEBJS engine (puppeteer-driven headless
  # Chromium). Requires shm_size for browser stability — without it, the
  # puppeteer page context can corrupt under memory pressure, breaking
  # getChats (chats/overview returns 500). mem_limit gives the Chromium
  # process headroom for the WhatsApp Web multi-page render.
  waha:
    image: devlikeapro/waha
    container_name: waha
    hostname: waha
    restart: unless-stopped
    shm_size: "2g"
    mem_limit: "4g"
    expose:
      - 3000
    # ports:
    #  - "8045:3000"
    environment:
      TZ: ${TZ}
      REDIS_URL: ${REDIS_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_API_KEY_PLAIN: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
      WAHA_DASHBOARD_ENABLED: ${WAHA_DASHBOARD_ENABLED}
      WHATSAPP_SWAGGER_ENABLED: ${WHATSAPP_SWAGGER_ENABLED}
      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE}
      WAHA_NAMESPACE: ${WAHA_NAMESPACE}
      WAHA_BASE_URL: ${WAHA_BASE_URL}
      WAHA_LOG_FORMAT: ${WAHA_LOG_FORMAT}
      WAHA_LOG_LEVEL: ${WAHA_LOG_LEVEL}
      WAHA_PRINT_QR: ${WAHA_PRINT_QR}
      WAHA_MEDIA_STORAGE: ${WAHA_MEDIA_STORAGE}
      WHATSAPP_FILES_LIFETIME: ${WHATSAPP_FILES_LIFETIME}
      WHATSAPP_FILES_FOLDER: ${WHATSAPP_FILES_FOLDER}
      WHATSAPP_API_SCHEMA: ${WHATSAPP_API_SCHEMA}
      WHATSAPP_API_HOSTNAME: ${WHATSAPP_API_HOSTNAME}
      WHATSAPP_API_PORT: ${WHATSAPP_API_PORT}
      WAHA_APPS_ENABLED: ${WAHA_APPS_ENABLED}
    volumes:
      - ./data/waha:/app/.sessions
      # Patched wwebjs Injected/Utils.js — wraps getChatModel in a
      # try/catch so a per-chat IDB error (WWeb schema change in
      # 2.3000.x: "Failed to execute 'get' on 'IDBObjectStore'") returns a
      # minimal model instead of crashing chats/overview with HTTP 500.
      # Remove when wwebjs > 1.34.7 ships a fix.
      - ./docker/waha-patches/Utils.js:/app/node_modules/whatsapp-web.js/src/util/Injected/Utils.js:ro
      # Patched WAHA session.webjs.core.js toWAMessage — wwebjs leaves
      # message.id._serialized undefined for group messages whose participant
      # is a LID ("@lid"), so parseMessageIdSerialized throws and WAHA drops
      # every incoming group message before the webhook fires. Fall back to
      # id.$1 (WWeb raw serialized) or rebuild via SerializeMsgKey. Remove
      # when devlikeapro/waha ships a LID-aware fix.
      - ./docker/waha-patches/session.webjs.core.js:/app/dist/core/engines/webjs/session.webjs.core.js:ro
    depends_on:
      - redis

  # SMTP catch-all for dev — enabled by default so magic-link emails have
  # somewhere to land without touching a real relay. Web UI at :8025.
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    hostname: mailpit
    restart: unless-stopped
    expose:
      - 1025
    ports:
      - "8025:8025"

  # Brain: one shared LightRAG container for ALL users/Brains. Per-user
  # isolation is via LightRAG's --workspace/WORKSPACE mechanism (kai names
  # them kai-v001-<sanitized-email>), NOT separate containers.
  lightrag:
    image: ghcr.io/hkuds/lightrag:v1.5.4
    container_name: lightrag
    hostname: lightrag
    restart: unless-stopped
    expose:
      - 9621
    environment:
      HOST: 0.0.0.0
      PORT: "9621"
      # Auth: kai authenticates with X-API-Key = KAI_BRAIN_LIGHTRAG_API_KEY.
      # /api/* (Ollama emulation) removed from the whitelist since unused —
      # leaving it open would be an unauthenticated RAG backdoor.
      LIGHTRAG_API_KEY: ${KAI_BRAIN_LIGHTRAG_API_KEY}
      WHITELIST_PATHS: /health
      # Concurrency knobs (server-global, not per-workspace).
      WORKERS: 2
      MAX_PARALLEL_INSERT: 3
      MAX_ASYNC_LLM: 4
      MAX_ASYNC_RERANK: 4
      # LLM (indexing: entity/relation extraction + summaries; query: answers)
      LLM_BINDING: openai
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST}
      LLM_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL}
      # Embedding — pinned at first upload (EMBEDDING_DIM=2560 verified
      # empirically against perplexity/pplx-embed-v1-4b via OpenRouter).
      EMBEDDING_BINDING: openai
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST}
      EMBEDDING_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL}
      EMBEDDING_DIM: 2560
      # Rerank (query-time only; cheap to change later, no re-index needed)
      RERANK_BINDING: cohere
      RERANK_BINDING_HOST: ${LIGHTRAG_RERANK_BINDING_HOST}
      RERANK_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      RERANK_MODEL: ${LIGHTRAG_RERANK_MODEL}
      # Document processing defaults
      SUMMARY_LANGUAGE: English
      ENTITY_EXTRACTION_USE_JSON: true
      VLM_PROCESS_ENABLE: false
    volumes:
      - ./data/lightrag/storage:/app/rag_storage
      - ./data/lightrag/inputs:/app/inputs

  # Brain: crawl4ai — one shared headless-browser crawler for website ingest.
  # Used strictly in non-LLM markdown mode (POST /md with f=fit/raw); the
  # Brain ingest path never sets f=llm, so no OPENAI_API_KEY/LLM env is set
  # on this container. kai's Crawl4aiClient authenticates with the bearer
  # token below (KAI_BRAIN_CRAWL4AI_TOKEN). shm_size is required for
  # headless Chromium stability.
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    hostname: crawl4ai
    restart: unless-stopped
    shm_size: "2g"
    expose:
      - 11235
    # The :latest image occasionally ships without its bundled chromium
    # (the layer that pre-populates /home/appuser/.cache/ms-playwright is
    # missing), so crawl4ai's Playwright launch fails with "Executable
    # doesn't exist". Install the browser at startup — cheap (deps are
    # already in the image; only the binary downloads) and idempotent.
    command: >-
      bash -c "python -m playwright install chromium && exec bash entrypoint.sh"
    environment:
      CRAWL4AI_API_TOKEN: ${KAI_BRAIN_CRAWL4AI_TOKEN}

  cockpit:
    build: .
    container_name: cockpit
    hostname: cockpit
    restart: unless-stopped
    command: kai cockpit serve --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./data/kai:/app/data
      - ./data/vendor:/app/vendor
      - ./data/models:/app/models
    env_file: .env
    depends_on:
      - waha
      - mailpit
      - crawl4ai
      - lightrag