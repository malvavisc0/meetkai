<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KAI cockpit</title>
  <link rel="stylesheet" href="/static/cockpit.css">
</head>
<body>
  <nav class="topbar">
    <span class="topbar__brand">KAI cockpit</span>
    {% if user %}
      <span class="topbar__nav">
        <a href="/">dashboard</a>
        <a href="/brain">brain</a>
        <a href="/connections">connections</a>
      </span>
      <span class="topbar__user">
        {{ user.email }}
        <a href="/logout">logout</a>
      </span>
    {% endif %}
  </nav>
  {% if flash %}
    <div class="flash">{{ flash }}</div>
  {% endif %}
  {% block content %}{% endblock %}
  <script src="/static/cockpit.js"></script>
</body>
</html>
