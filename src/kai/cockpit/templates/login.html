{% extends "base.html" %}
{% block content %}
<div class="page page--narrow stack">
  {% if requested %}
    <div class="card empty-state">
      <p>An access request has been sent. Ask an admin to approve it.</p>
    </div>
  {% else %}
    <div class="card stack card--center">
      <form method="post" class="stack text-left">
        <div class="field">
          <label class="field__label" for="email">Email</label>
          <input id="email" type="text" name="email" required>
        </div>
        <button type="submit" class="button button--primary button--block">Send magic link</button>
      </form>
    </div>
  {% endif %}
  {% if error %}
    <p class="text-danger">{{ error }}</p>
  {% endif %}
</div>
{% endblock %}
