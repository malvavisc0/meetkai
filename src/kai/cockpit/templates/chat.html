{% extends "base.html" %}
{% block content %}
<div class="page stack">
  <header class="page-header">
    <p class="page-eyebrow">Test chat</p>
    <h1 class="page-title">Chat — {{ dep.bot_type }}</h1>
    <p class="page-subtitle">Control the bot or ask question from here.</p>
  </header>

  {% if reply %}
    <div class="log-panel">
      <div class="log-panel__line">
        <b class="mono">kai&gt;</b>
        <span class="log-panel__content">{{ reply }}</span>
      </div>
    </div>
  {% endif %}

  <form method="post" class="card status-card stack">
    <div class="field">
      <label class="sr-only" for="message">Operator message</label>
      <textarea id="message" name="message" rows="4" required data-autosize
        placeholder="Try a message KAI might get from a real user…"></textarea>
    </div>
    <label class="checkbox-row">
      <input type="checkbox" name="persist" value="true"> Allow lasting changes
    </label>
    <div class="cluster">
      <button type="submit" class="button button--primary"><span class="icon">{% include "icons/send.svg" %}</span> Send</button>
    </div>
  </form>

  <form method="post" action="/deployments/{{ dep.id }}/chat/clear" data-confirm="Clear this chat history?">
    <button type="submit" class="button button--danger"><span class="icon">{% include "icons/trash-2.svg" %}</span> Clear history</button>
  </form>
</div>
{% endblock %}
