name: general
transport: email
display_name: kAI
description: >
  The default kAI email support bot. Knowledge-grounded, professional tone,
  answers product questions via Brain when connected.

actions:
  - reply
  - silent
  - console

config:
  temperature: 0.2

tools:
  required: []
  optional:
    - brain_query
    - sql_query
    - send_email
    - calcom
    # Bot-owned tools — no env vars, so they resolve as present. Declared so
    # gating on the resolved tool set keeps today's behavior for `general`.
    - record_note
    - get_conversation_messages
    - schedule_task
    - list_tasks
    - cancel_task

post_processing:
  profile: none

reply_style: ""

goal_suggestion: |
  Answer support questions by email, grounded in the Brain when available.

min_version: "0.1.0"