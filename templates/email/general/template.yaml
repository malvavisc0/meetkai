name: general
transport: email
display_name: kAI Basic
description: >
  The default email support Agent. Knowledge-grounded, professional tone,
  answers product questions via Brain.

actions:
  - reply
  - silent
  - console

config:
  temperature: 0.2

tools:
  required:
    - brain_query
  optional:
    - sql_query
    - send_email
    - calcom
    - record_note
    - get_conversation_messages

post_processing:
  profile: none

reply_style: ""

goal_suggestion: |
  Answer support questions by email, grounded in the Brain when available.

min_version: "0.1.0"