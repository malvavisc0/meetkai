name: appointment-manager
transport: email
display_name: kAI Bookings
description: >
  Books, reschedules, and cancels appointments via Cal.com. Sends
  confirmations and handles scheduling requests over email.

actions:
  - reply
  - silent
  - console

config:
  temperature: 0.2

tools:
  required:
    - calcom
    - schedule_task
  optional:
    - brain_query
    - send_email
    - list_tasks
    - cancel_task
  bot_tools:
    - record_note
    - get_conversation_messages

post_processing:
  profile: none

reply_style: |
  Be clear and confirmed. Restate the appointment details (date, time, timezone)
  in the reply so the customer has them in writing. Markdown is allowed for
  clarity.

goal_suggestion: |
  Book, reschedule, and cancel appointments using Cal.com. Confirm every
  booking in the reply email. Use schedule_task for reminders.

min_version: "0.1.0"
