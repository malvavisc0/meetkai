name: meetkai-dev

networks:
  odyssey:

volumes:
  redis-data:
  waha-sessions:
  morphik-storage:
  morphik-postgres-data:
  kai-data:
  kai-vendor:
  kai-models:

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    hostname: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - odyssey

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    hostname: waha
    restart: unless-stopped
    shm_size: "2g"
    mem_limit: "4g"
    expose:
      - 3000
    environment:
      TZ: ${TZ}
      REDIS_URL: ${REDIS_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_API_KEY_PLAIN: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
      WAHA_DASHBOARD_ENABLED: ${WAHA_DASHBOARD_ENABLED}
      WHATSAPP_SWAGGER_ENABLED: ${WHATSAPP_SWAGGER_ENABLED}
      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE}
      WAHA_NAMESPACE: ${WAHA_NAMESPACE}
      WAHA_BASE_URL: ${WAHA_BASE_URL}
      WAHA_LOG_FORMAT: ${WAHA_LOG_FORMAT}
      WAHA_LOG_LEVEL: ${WAHA_LOG_LEVEL}
      WAHA_PRINT_QR: ${WAHA_PRINT_QR}
      WAHA_MEDIA_STORAGE: ${WAHA_MEDIA_STORAGE}
      WHATSAPP_FILES_LIFETIME: ${WHATSAPP_FILES_LIFETIME}
      WHATSAPP_FILES_FOLDER: ${WHATSAPP_FILES_FOLDER}
      WHATSAPP_API_SCHEMA: ${WHATSAPP_API_SCHEMA}
      WHATSAPP_API_HOSTNAME: ${WHATSAPP_API_HOSTNAME}
      WHATSAPP_API_PORT: ${WHATSAPP_API_PORT}
      WAHA_APPS_ENABLED: ${WAHA_APPS_ENABLED}
    volumes:
      - waha-sessions:/app/.sessions
    depends_on:
      - redis
    networks:
      - odyssey

  mailpit:
    image: axllent/mailpit:v1.30
    container_name: mailpit
    hostname: mailpit
    restart: unless-stopped
    expose:
      - 1025
    ports:
      - "8025:8025"
    networks:
      - odyssey

  morphik:
    image: ghcr.io/morphik-org/morphik-core:2026-07-05
    container_name: morphik
    hostname: morphik
    restart: unless-stopped
    expose:
      - 8000
    environment:
      JWT_SECRET_KEY: ${KAI_BRAIN_MORPHIK_JWT_SECRET}
      LOCAL_URI_PASSWORD: ${KAI_BRAIN_MORPHIK_LOCAL_PASSWORD}
      POSTGRES_URI: postgresql+asyncpg://${MORPHIK_POSTGRES_USER}:${MORPHIK_POSTGRES_PASSWORD}@morphik-postgres:5432/${MORPHIK_POSTGRES_DB}
      PGPASSWORD: ${MORPHIK_POSTGRES_PASSWORD}
      PGHOST: morphik-postgres
      PGPORT: "5432"
      PGUSER: ${MORPHIK_POSTGRES_USER}
      PGDATABASE: ${MORPHIK_POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - morphik-storage:/app/storage
      - ./docker/morphik.toml:/app/morphik.toml:ro
    depends_on:
      morphik-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - odyssey

  morphik-postgres:
    image: pgvector/pgvector:pg18
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${MORPHIK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MORPHIK_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MORPHIK_POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - morphik-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MORPHIK_POSTGRES_USER} -d ${MORPHIK_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - odyssey

  crawl4ai:
    image: unclecode/crawl4ai:0
    container_name: crawl4ai
    hostname: crawl4ai
    restart: unless-stopped
    shm_size: "2g"
    expose:
      - 11235
    command: >-
      bash -c "python -m playwright install chromium && exec bash entrypoint.sh"
    environment:
      CRAWL4AI_API_TOKEN: ${KAI_BRAIN_CRAWL4AI_TOKEN}
    networks:
      - odyssey

  cockpit:
    build: .
    image: meetkai-dev-cockpit
    pull_policy: never
    user: appuser
    container_name: cockpit
    hostname: cockpit
    restart: unless-stopped
    command: kai cockpit serve --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - kai-data:/app/data
      - kai-vendor:/app/vendor
      - kai-models:/app/models
    env_file: .env
    depends_on:
      waha:
        condition: service_started
      mailpit:
        condition: service_started
      crawl4ai:
        condition: service_started
      morphik:
        condition: service_healthy
    networks:
      - odyssey
