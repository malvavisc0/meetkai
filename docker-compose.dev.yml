name: meetkai-dev

# Dev override. The cockpit image runs as non-root uid 1000 (see Dockerfile),
# so the bind-mounted ./data/* dirs below must be owned by uid 1000 on the
# host. If they're root-owned, fix once: sudo chown -R 1000:1000 data/
# (postgres is the exception — it runs as uid 999, so ./data/lightrag/postgres
# must be owned by 999:999.)

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    hostname: redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    hostname: waha
    restart: unless-stopped
    shm_size: "2g"
    mem_limit: "4g"
    expose:
      - 3000
    environment:
      TZ: ${TZ}
      REDIS_URL: ${REDIS_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_API_KEY_PLAIN: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
      WAHA_DASHBOARD_ENABLED: ${WAHA_DASHBOARD_ENABLED}
      WHATSAPP_SWAGGER_ENABLED: ${WHATSAPP_SWAGGER_ENABLED}
      WHATSAPP_DEFAULT_ENGINE: ${WHATSAPP_DEFAULT_ENGINE}
      WAHA_NAMESPACE: ${WAHA_NAMESPACE}
      WAHA_BASE_URL: ${WAHA_BASE_URL}
      WAHA_LOG_FORMAT: ${WAHA_LOG_FORMAT}
      WAHA_LOG_LEVEL: ${WAHA_LOG_LEVEL}
      WAHA_PRINT_QR: ${WAHA_PRINT_QR}
      WAHA_MEDIA_STORAGE: ${WAHA_MEDIA_STORAGE}
      WHATSAPP_FILES_LIFETIME: ${WHATSAPP_FILES_LIFETIME}
      WHATSAPP_FILES_FOLDER: ${WHATSAPP_FILES_FOLDER}
      WHATSAPP_API_SCHEMA: ${WHATSAPP_API_SCHEMA}
      WHATSAPP_API_HOSTNAME: ${WHATSAPP_API_HOSTNAME}
      WHATSAPP_API_PORT: ${WHATSAPP_API_PORT}
      WAHA_APPS_ENABLED: ${WAHA_APPS_ENABLED}
    volumes:
      - ./data/waha:/app/.sessions
    depends_on:
      - redis

  mailpit:
    image: axllent/mailpit:v1.30
    container_name: mailpit
    hostname: mailpit
    restart: unless-stopped
    expose:
      - 1025
    ports:
      - "8025:8025"

  lightrag:
    image: ghcr.io/hkuds/lightrag:v1.5.4
    container_name: lightrag
    hostname: lightrag
    restart: unless-stopped
    expose:
      - 9621
    environment:
      HOST: 0.0.0.0
      PORT: "9621"
      LIGHTRAG_API_KEY: ${KAI_BRAIN_LIGHTRAG_API_KEY}
      WHITELIST_PATHS: /health
      WORKERS: 2
      MAX_PARALLEL_INSERT: 3
      MAX_ASYNC_LLM: 4
      MAX_ASYNC_RERANK: 4
      LLM_BINDING: openai
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST}
      LLM_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL}
      EMBEDDING_BINDING: openai
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST}
      EMBEDDING_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL}
      EMBEDDING_DIM: 2560
      RERANK_BINDING: cohere
      RERANK_BINDING_HOST: ${LIGHTRAG_RERANK_BINDING_HOST}
      RERANK_BINDING_API_KEY: ${OPENROUTER_API_KEY}
      RERANK_MODEL: ${LIGHTRAG_RERANK_MODEL}
      SUMMARY_LANGUAGE: English
      ENTITY_EXTRACTION_USE_JSON: true
      VLM_PROCESS_ENABLE: false
      # Postgres backend — workspace is a column on every table, so the
      # per-request workspace kai sends is actually honored (the JSON/KV
      # backend ignores it and mixes users into one flat store).
      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      LIGHTRAG_GRAPH_STORAGE: PGGraphStorage
      LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${LIGHTRAG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LIGHTRAG_POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${LIGHTRAG_POSTGRES_DATABASE}
      POSTGRES_MAX_CONNECTIONS: "25"
      POSTGRES_VECTOR_INDEX_TYPE: HNSW_HALFVEC
    volumes:
      - ./data/lightrag/storage:/app/data/rag_storage
      - ./data/lightrag/inputs:/app/data/inputs
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${LIGHTRAG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LIGHTRAG_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LIGHTRAG_POSTGRES_DATABASE}
    volumes:
      - ./data/lightrag/postgres:/var/lib/postgresql
      - ./docker/lightrag-pg-init.sql:/docker-entrypoint-initdb.d/01-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIGHTRAG_POSTGRES_USER} -d ${LIGHTRAG_POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  crawl4ai:
    image: unclecode/crawl4ai:0
    container_name: crawl4ai
    hostname: crawl4ai
    restart: unless-stopped
    shm_size: "2g"
    expose:
      - 11235
    command: >-
      bash -c "python -m playwright install chromium && exec bash entrypoint.sh"
    environment:
      CRAWL4AI_API_TOKEN: ${KAI_BRAIN_CRAWL4AI_TOKEN}

  cockpit:
    build: .
    user: appuser
    container_name: cockpit
    hostname: cockpit
    restart: unless-stopped
    command: kai cockpit serve --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./data/kai:/app/data
      - ./data/vendor:/app/vendor
      - ./data/models:/app/models
    env_file: .env
    depends_on:
      - waha
      - mailpit
      - crawl4ai
      - lightrag
